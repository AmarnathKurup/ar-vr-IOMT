<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    /* Main Card */
    #card {
      position: relative;
      width: 320px;
      height: 550px;
    }

    /* Background UI */
    #uiImage {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Scanner Area */
    #scanner-frame {
      position: absolute;

      top: 5px;
      left: 5px;

      width: 310px;
      height: 340px;

      overflow: hidden;
      z-index: 5;

      border-radius: 5px;
    }

    /* AR Scene */
    #a-scene-container {
      width: 100%;
      height: 100%;
    }

    /* Message */
    #message {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      width: 100%;
      text-align: center;
      color: white;
      z-index: 20;
      font-size: 18px;
      text-shadow: 0 0 10px black;
    }
  </style>
</head>

<body>

  <div id="card">

    <!-- UI Background -->
    <img id="uiImage" src="./Images/card.png">

    <!-- Status -->
    <div id="message">
      Scan Marker
    </div>

    <!-- Scanner Window -->
    <div id="scanner-frame">

      <div id="a-scene-container">

        <a-scene mindar-image="
            imageTargetSrc: ./targets/Sensor_targets.mind;
            autoStart: true;
            uiScanning: false;
            uiLoading: no;
            filterMinCF: 0.0001;
            filterBeta: 0.001;
          " embedded color-space="sRGB" vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false"
          renderer="
            precision:mediump;
            antialias:false;
            physicallyCorrectLights:false;
          ">

          <!-- ASSETS -->
          <a-assets>

            <!-- Sensor Dashboard -->
            <img id="sensorDashboard" src="./Images/sensor.png">

            <!-- Temperature Dashboard -->
            <img id="temperatureDashboard" src="./Images/temperature.png">

          </a-assets>

          <!-- Camera -->
          <a-camera position="0 0 0"></a-camera>


          <!-- ================================================= -->
          <!-- SENSOR MARKER -->
          <!-- ================================================= -->

          <a-entity id="sensorMarker" mindar-image-target="targetIndex:0">

            <a-entity id="sensorContainer" position="0 0 0" scale="1 1 1">

              <!-- Dashboard -->
              <a-plane src="#sensorDashboard" position="0 0 0" width="1.5" height="1.5" transparent="true"></a-plane>

              <!-- SENSOR -->
              <a-text id="sensorText" value="98%" color="#00ffff" align="center" position="0.4 0.4 0.01"
                scale="0.5 0.5 0.5" shader="msdf"></a-text>

              <!-- SENSOR CONDITION -->
              <a-text id="sensorconditionText" value="Hypoxemia Moderate" color="#00ffff" align="center"
                position="0 0.2 0.01" scale="0.5 0.5 0.5" shader="msdf"></a-text>

              <!-- HEART -->
              <a-text id="heartText" value="78 bpm" color="#00ffff" align="center" position="0.3 -0.13 0.01"
                scale="0.5 0.5 0.5" shader="msdf"></a-text>

              <!-- HEART CONDITION -->
              <a-text id="heartconditionText" value="Tachycardia Severe" color="#00ffff" align="center"
                position="0 -0.32 0.01" scale="0.5 0.5 0.5" shader="msdf"></a-text>

            </a-entity>
          </a-entity>
        </a-scene>
      </div>
    </div>
  </div>

  <script>

    const message =
      document.querySelector("#message");

    /* ================================================= */
    /* SENSOR MARKER */
    /* ================================================= */

    const sensorMarker =
      document.querySelector("#sensorMarker");

    sensorMarker.addEventListener(
      "targetFound",
      () => {

        console.log("SENSOR FOUND");

        message.innerHTML =
          "Sensor Marker Detected";

      }
    );

    sensorMarker.addEventListener(
      "targetLost",
      () => {

        console.log("SENSOR LOST");

        message.innerHTML =
          "Scan Marker";

      }
    );

    /* ========================================= */
/* SENSOR API */
/* ========================================= */

const SENSOR_API ="http://localhost:5000/api/v1/max30100/latest"; /*Change this to your actual API URL*/

async function fetchSensorData(){

  try{

    const response =
      await fetch(SENSOR_API);

    const data =
      await response.json();

    /*
      {
        "heart_rate": 72.9,
        "spo2": 50.4,
        "heart_condition": "Normal",
        "spo2_condition": "Severe Hypoxemia"
      }
    */

    document
      .querySelector("#sensorText")
      .setAttribute(
        "value",
        `${data.spo2.toFixed(1)}%`
      );

    document
      .querySelector("#sensorconditionText")
      .setAttribute(
        "value",
        data.spo2_condition
      );

    document
      .querySelector("#heartText")
      .setAttribute(
        "value",
        `${data.heart_rate.toFixed(1)} bpm`
      );

    document
      .querySelector("#heartconditionText")
      .setAttribute(
        "value",
        data.heart_condition
      );

  }
  catch(error){

    console.log(
      "Sensor API Error:",
      error
    );

  }

}

/* INITIAL LOAD */
fetchSensorData();

/* AUTO REFRESH EVERY 1 SECOND */
setInterval(
  fetchSensorData,
  1000
);


    /* ================================================= */
    /* DRAG + PAN + ZOOM */
    /* ================================================= */

    const sensorContainer =
      document.querySelector("#sensorContainer");

    const temperatureContainer =
      document.querySelector("#temperatureContainer");

    let activeContainer = null;

    let pos = { x: 0, y: 0 };

    let scale = 1;

    let isDragging = false;

    let startX = 0;
    let startY = 0;


    /* SELECT ACTIVE CONTAINER */

    sensorMarker.addEventListener(
      "targetFound",
      () => {

        activeContainer = sensorContainer;

      }
    );

    temperatureMarker.addEventListener(
      "targetFound",
      () => {

        activeContainer = temperatureContainer;

      }
    );


    /* TOUCH START */

    window.addEventListener(
      "touchstart",
      (e) => {

        if (e.touches.length === 1) {

          isDragging = true;

          startX =
            e.touches[0].clientX;

          startY =
            e.touches[0].clientY;

        }

      }
    );


    /* TOUCH MOVE */

    window.addEventListener(
      "touchmove",
      (e) => {

        if (!activeContainer) return;

        /* PAN */

        if (
          isDragging &&
          e.touches.length === 1
        ) {

          let dx =
            (e.touches[0].clientX - startX) * 0.002;

          let dy =
            (e.touches[0].clientY - startY) * -0.002;

          pos.x += dx;
          pos.y += dy;

          activeContainer.setAttribute(
            "position",
            `${pos.x} ${pos.y} 0`
          );

          startX =
            e.touches[0].clientX;

          startY =
            e.touches[0].clientY;
        }

        /* PINCH ZOOM */

        if (e.touches.length === 2) {

          const dx =
            e.touches[0].clientX -
            e.touches[1].clientX;

          const dy =
            e.touches[0].clientY -
            e.touches[1].clientY;

          const distance =
            Math.sqrt(dx * dx + dy * dy);

          scale = distance / 200;

          if (scale < 0.5)
            scale = 0.5;

          if (scale > 3)
            scale = 3;

          activeContainer.setAttribute(
            "scale",
            `${scale} ${scale} ${scale}`
          );

        }

      }
    );


    /* TOUCH END */

    window.addEventListener(
      "touchend",
      () => {

        isDragging = false;

      }
    );

  </script>

</body>

</html>
